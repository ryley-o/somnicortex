name: lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Node deps
        run: pnpm install --frozen-lockfile=false
      - name: Lint TypeScript
        run: pnpm lint && pnpm typecheck
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Lint Python kernel
        run: uv run --project packages/kernel-py ruff check . && uv run --project packages/kernel-py mypy packages/kernel-py/somnicortex_kernel
